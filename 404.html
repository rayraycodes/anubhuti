<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Anubhuti</title>
    <!-- GitHub Pages SPA fallback (single-page-apps-for-github-pages). A direct
         hit on /anubhuti/about has no file, so Pages serves this 404; it rewrites
         the URL to /anubhuti/?/about and loads the app, which decodes it back.
         pathSegmentsToKeep = 1 keeps the /anubhuti/ project base. -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
