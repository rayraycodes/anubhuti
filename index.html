    <!-- Single-page-app routing on GitHub Pages: decode the path that 404.html
         stashed in the query string (e.g. /anubhuti/?/about -> /anubhuti/about). -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
