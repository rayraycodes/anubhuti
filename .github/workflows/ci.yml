name: CI

# Type-check, test and build on PRs and on feature-branch pushes.
# (Pushes to main are covered by deploy.yml, so they're excluded here.)

on:
  pull_request:
  push:
    branches-ignore: [main, gh-pages]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Test
        run: npm test

      - name: Build (type-check + bundle)
        run: npm run build
