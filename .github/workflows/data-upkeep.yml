name: Data upkeep

# Keeps the opportunities data honest.
#  • health-check: weekly link + deadline check → opens/updates a tracking issue.
#  • ai-refresh:  OPT-IN, FREE. Runs only if the GEMINI_API_KEY secret is set;
#                 asks Google Gemini (free tier, with web search) to re-verify the
#                 list and opens a PR for review. Never auto-merges, never touches
#                 the live site. Free key: https://aistudio.google.com/apikey

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Check links & deadlines
        id: check
        run: npm run data:check

      - name: Open or update tracking issue
        if: steps.check.outputs.has_findings == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create data-health --color FBBF24 \
            --description "Opportunity data freshness" --force >/dev/null 2>&1 || true
          num=$(gh issue list --state open --label data-health --json number --jq '.[0].number // empty')
          if [ -n "$num" ]; then
            gh issue edit "$num" --body-file data-health-report.md
            gh issue comment "$num" --body "Re-checked on $(date -u +%Y-%m-%d): ${{ steps.check.outputs.summary }}."
          else
            gh issue create --title "Opportunity data needs a refresh" \
              --label data-health --body-file data-health-report.md
          fi

  ai-refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Gate on GEMINI_API_KEY
        id: gate
        env:
          KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GEMINI_API_KEY not set — skipping AI refresh. Add the free secret to enable it."
          fi

      - if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - if: steps.gate.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh opportunities with Gemini (free tier)
        if: steps.gate.outputs.enabled == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/refresh-opportunities.mjs

      - name: Open a review PR
        if: steps.gate.outputs.enabled == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/opportunities-refresh
          base: main
          add-paths: src/data/opportunities.json
          commit-message: 'data: refresh opportunities (AI-assisted)'
          title: 'Refresh opportunities (AI-assisted)'
          body: |
            Automated re-verification of `src/data/opportunities.json` by Google Gemini (free tier, with web search).

            **Review before merging** — confirm the links resolve and the deadlines look right.
            This PR never auto-merges.
          labels: data-health
          delete-branch: true
