name: Deploy

# Build and publish to GitHub Pages (gh-pages branch) on every push to main.
# Replaces the manual `npm run deploy`.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          # No `cname:` — the custom domain (reganmaharjan.com.np) is inherited
          # from the rayraycodes.github.io user site. peaceiris adds .nojekyll.
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
